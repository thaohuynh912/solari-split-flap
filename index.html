<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solari Split-Flap Display</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Theme: dark (default) — hue 0, sat 0%, dark mode */
      --sf-body-bg: #111;
      --sf-board-bg: #1a1a1a;
      --sf-flap-top: #2a2a2a;
      --sf-flap-bottom: #222;
      --sf-gap-line: #111;
      --sf-text: #f0f0f0;
      --sf-author: #f5c542;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: var(--sf-body-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.4s ease;
    }

    .split-flap-board {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 2rem;
      background: var(--sf-board-bg);
      border-radius: 12px;
      width: fit-content;
      margin: 2rem auto;
      overflow: hidden;
      transition: background 0.4s ease;
    }

    .split-flap-row {
      display: flex;
      gap: 3px;
    }

    .split-flap-cell {
      width: 28px;
      height: 40px;
      perspective: 200px;
    }

    .flap-display {
      position: relative;
      width: 100%;
      height: 100%;
      font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", "Courier New", monospace;
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--sf-text);
      text-align: center;
      transition: color 0.4s ease;
    }

    .flap-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: var(--sf-flap-top);
      border-radius: 3px 3px 0 0;
      overflow: hidden;
      z-index: 1;
      transition: background 0.4s ease;
    }

    .flap-top .flap-char {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: var(--sf-flap-bottom);
      border-radius: 0 0 3px 3px;
      overflow: hidden;
      z-index: 1;
      transition: background 0.4s ease;
    }

    .flap-bottom .flap-char {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-flip {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    .flap-flip.flipping {
      display: block;
      animation: flapDown 0.15s ease-in forwards;
    }

    .flap-flip-front {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--sf-flap-top);
      border-radius: 3px 3px 0 0;
      backface-visibility: hidden;
      overflow: hidden;
      transition: background 0.4s ease;
    }

    .flap-flip-front .flap-char {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-flip-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--sf-flap-bottom);
      border-radius: 0 0 3px 3px;
      backface-visibility: hidden;
      transform: rotateX(180deg);
      overflow: hidden;
      transition: background 0.4s ease;
    }

    .flap-flip-back .flap-char {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-top::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--sf-gap-line);
      z-index: 5;
      transition: background 0.4s ease;
    }

    .split-flap-cell.author-cell .flap-top .flap-char,
    .split-flap-cell.author-cell .flap-bottom .flap-char,
    .split-flap-cell.author-cell .flap-flip-front .flap-char,
    .split-flap-cell.author-cell .flap-flip-back .flap-char {
      color: var(--sf-author);
    }

    /* Theme switcher hint */
    .theme-hint {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 0.7rem;
      color: var(--sf-text);
      opacity: 0.3;
      font-family: "SF Mono", "Fira Code", monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      pointer-events: none;
      transition: color 0.4s ease, opacity 0.4s ease;
    }
    .theme-hint .key {
      display: inline-block;
      border: 1px solid;
      border-radius: 3px;
      padding: 0.1em 0.35em;
      margin: 0 0.15em;
      opacity: 0.6;
    }

    @keyframes flapDown {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-180deg); }
    }

    @media (max-width: 768px) {
      .split-flap-cell {
        width: 18px;
        height: 28px;
      }
      .flap-display {
        font-size: 0.75rem;
      }
      .split-flap-board {
        gap: 2px;
        padding: 1rem;
      }
      .split-flap-row {
        gap: 2px;
      }
    }

    @media (max-width: 480px) {
      .split-flap-cell {
        width: 14px;
        height: 22px;
      }
      .flap-display {
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>

<div class="split-flap-board" id="board"></div>
<div class="theme-hint"><span class="key">T</span> cycle theme</div>

<script>
(function() {
  // ──────────────────────────────────────────────
  // Theme engine
  // ──────────────────────────────────────────────
  //
  // Physics: light comes from above.
  //   - Top flap: lighter (catches light)
  //   - Bottom flap: darker (in shadow)
  //   - Board bg: darkest (recessed behind flaps)
  //   - Gap line: matches board bg (shadow between flaps)
  //   - Body bg: slightly darker/lighter than board for depth
  //
  // For dark themes: low lightness, text is light
  // For light themes: high lightness, text is dark
  //
  // generateTheme(hue, saturation, mode)
  //   hue: 0-360
  //   saturation: 0-100
  //   mode: 'dark' or 'light'

  function hsl(h, s, l) {
    return 'hsl(' + h + ', ' + s + '%, ' + l + '%)';
  }

  function generateTheme(hue, sat, mode) {
    if (mode === 'dark') {
      return {
        bodyBg:    hsl(hue, sat, 6),
        boardBg:   hsl(hue, sat, 10),
        flapTop:   hsl(hue, sat, 18),
        flapBottom: hsl(hue, sat, 14),
        gapLine:   hsl(hue, sat, 6),
        text:      hsl(hue, Math.min(sat, 10), 94),
        author:    hsl(45, 85, 60)
      };
    } else {
      return {
        bodyBg:    hsl(hue, sat, 95),
        boardBg:   hsl(hue, sat, 88),
        flapTop:   hsl(hue, sat, 82),
        flapBottom: hsl(hue, sat, 76),
        gapLine:   hsl(hue, sat, 70),
        text:      hsl(hue, sat, 10),
        author:    hsl(45, 85, 42)
      };
    }
  }

  function applyTheme(theme) {
    var root = document.documentElement;
    root.style.setProperty('--sf-body-bg', theme.bodyBg);
    root.style.setProperty('--sf-board-bg', theme.boardBg);
    root.style.setProperty('--sf-flap-top', theme.flapTop);
    root.style.setProperty('--sf-flap-bottom', theme.flapBottom);
    root.style.setProperty('--sf-gap-line', theme.gapLine);
    root.style.setProperty('--sf-text', theme.text);
    root.style.setProperty('--sf-author', theme.author);
  }

  // Preset themes
  var themes = [
    { name: 'classic',   hue: 0,   sat: 0,  mode: 'dark' },
    { name: 'mint',      hue: 155, sat: 30, mode: 'dark' },
    { name: 'ocean',     hue: 210, sat: 35, mode: 'dark' },
    { name: 'purple',    hue: 270, sat: 30, mode: 'dark' },
    { name: 'amber',     hue: 35,  sat: 40, mode: 'dark' },
    { name: 'rose',      hue: 345, sat: 25, mode: 'dark' },
    { name: 'fog',       hue: 0,   sat: 0,  mode: 'light' },
    { name: 'sage',      hue: 140, sat: 15, mode: 'light' },
    { name: 'lavender',  hue: 260, sat: 20, mode: 'light' },
    { name: 'sand',      hue: 35,  sat: 20, mode: 'light' }
  ];

  var themeIndex = 0;

  document.addEventListener('keydown', function(e) {
    if (e.key === 't' || e.key === 'T') {
      themeIndex = (themeIndex + 1) % themes.length;
      var t = themes[themeIndex];
      applyTheme(generateTheme(t.hue, t.sat, t.mode));
    }
  });

  // ──────────────────────────────────────────────
  // Configuration
  // ──────────────────────────────────────────────
  var COLS = 20;
  var ROWS = 8;
  var FLIP_MS = 150;       // single flap animation duration
  var CHAR_DELAY = 50;     // ms stagger between cells in cascade
  var HOLD_MS = 5000;      // hold finished quote before next

  // ──────────────────────────────────────────────
  // Quotes — each entry is an array of lines.
  // Lines prefixed with @ are author names (yellow).
  // ──────────────────────────────────────────────
  var quotes = [
    ['THE BEST WAY TO',
     'PREDICT THE FUTURE',
     'IS TO INVENT IT.',
     '',
     '@ALAN KAY'],

    ['DESIGN IS NOT JUST',
     'WHAT IT LOOKS LIKE.',
     'DESIGN IS HOW',
     'IT WORKS.',
     '',
     '@STEVE JOBS'],

    ['SIMPLICITY IS THE',
     'ULTIMATE',
     'SOPHISTICATION.',
     '',
     '@LEONARDO DA VINCI'],

    ['MAKE IT SIMPLE,',
     'BUT SIGNIFICANT.',
     '',
     '@DON DRAPER'],

    ['STAY HUNGRY.',
     'STAY FOOLISH.',
     '',
     '@STEWART BRAND'],

    ['GOOD DESIGN IS',
     'AS LITTLE DESIGN',
     'AS POSSIBLE.',
     '',
     '@DIETER RAMS'],

    ['THE DETAILS ARE NOT',
     'THE DETAILS. THEY',
     'MAKE THE DESIGN.',
     '',
     '@CHARLES EAMES'],

    ['HAVE THE COURAGE',
     'TO FOLLOW YOUR',
     'HEART AND',
     'INTUITION.',
     '',
     '@STEVE JOBS'],

    ['I THINK,',
     'THEREFORE I AM.',
     '',
     '@RENE DESCARTES'],

    ['THE ONLY THING WE',
     'HAVE TO FEAR IS',
     'FEAR ITSELF.',
     '',
     '@FDR'],

    ['IMAGINATION IS',
     'MORE IMPORTANT',
     'THAN KNOWLEDGE.',
     '',
     '@ALBERT EINSTEIN'],

    ['TO BE OR NOT',
     'TO BE, THAT IS',
     'THE QUESTION.',
     '',
     '@SHAKESPEARE'],

    ['IN THE MIDDLE OF',
     'DIFFICULTY LIES',
     'OPPORTUNITY.',
     '',
     '@ALBERT EINSTEIN'],

    ['THE UNEXAMINED',
     'LIFE IS NOT WORTH',
     'LIVING.',
     '',
     '@SOCRATES'],

    ['WE ARE WHAT WE',
     'REPEATEDLY DO.',
     'EXCELLENCE IS',
     'NOT AN ACT,',
     'BUT A HABIT.',
     '',
     '@ARISTOTLE'],

    ['IF YOU ARE GOING',
     'THROUGH HELL,',
     'KEEP GOING.',
     '',
     '@CHURCHILL'],

    ['BE THE CHANGE YOU',
     'WISH TO SEE IN',
     'THE WORLD.',
     '',
     '@GANDHI'],

    ['THAT WHICH DOES',
     'NOT KILL US MAKES',
     'US STRONGER.',
     '',
     '@NIETZSCHE'],

    ['I HAVE NOT FAILED.',
     'I HAVE JUST FOUND',
     '10000 WAYS THAT',
     'WONT WORK.',
     '',
     '@THOMAS EDISON'],

    ['THE MEDIUM IS',
     'THE MESSAGE.',
     '',
     '@MARSHALL MCLUHAN']
  ];

  // ──────────────────────────────────────────────
  // Build DOM
  // ──────────────────────────────────────────────
  var board = document.getElementById('board');

  for (var r = 0; r < ROWS; r++) {
    var row = document.createElement('div');
    row.className = 'split-flap-row';
    for (var c = 0; c < COLS; c++) {
      row.innerHTML +=
        '<div class="split-flap-cell">' +
          '<div class="flap-display">' +
            '<div class="flap-top"><span class="flap-char">&nbsp;</span></div>' +
            '<div class="flap-bottom"><span class="flap-char">&nbsp;</span></div>' +
            '<div class="flap-flip">' +
              '<div class="flap-flip-front"><span class="flap-char">&nbsp;</span></div>' +
              '<div class="flap-flip-back"><span class="flap-char">&nbsp;</span></div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }
    board.appendChild(row);
  }

  var cells = board.querySelectorAll('.split-flap-cell');
  var totalCells = COLS * ROWS;
  var currentChars = [];
  for (var i = 0; i < totalCells; i++) currentChars.push(' ');

  // ──────────────────────────────────────────────
  // Audio — synthesized mechanical click
  // ──────────────────────────────────────────────
  var audioCtx = null;
  var soundEnabled = false;

  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      soundEnabled = true;
    } catch(e) { soundEnabled = false; }
  }

  function playClick() {
    if (!soundEnabled || !audioCtx) return;
    var duration = 0.012;
    var now = audioCtx.currentTime;
    var bufferSize = Math.ceil(audioCtx.sampleRate * duration);
    var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.3;
    }
    var source = audioCtx.createBufferSource();
    source.buffer = buffer;
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 3000 + Math.random() * 1000;
    filter.Q.value = 1.5;
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.08 + Math.random() * 0.04, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(now);
    source.stop(now + duration);
  }

  document.addEventListener('click', function() { initAudio(); }, { once: true });
  document.addEventListener('keydown', function() { initAudio(); }, { once: true });

  // ──────────────────────────────────────────────
  // Drum — fixed character sequence (physically correct)
  // The blank flap is position 0 on the drum.
  // The drum only spins forward, never backward.
  // ──────────────────────────────────────────────
  var drum = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,:;!?\'-';
  var drumIndex = {};
  for (var di = 0; di < drum.length; di++) drumIndex[drum[di]] = di;

  // Per-cell timer tracking
  var cellTimers = [];
  for (var ct = 0; ct < totalCells; ct++) cellTimers.push([]);

  function cancelCell(index) {
    var timers = cellTimers[index];
    for (var t = 0; t < timers.length; t++) clearTimeout(timers[t]);
    cellTimers[index] = [];
  }

  // ──────────────────────────────────────────────
  // Flip a single cell to a new character
  // ──────────────────────────────────────────────
  function flipCell(index, newChar) {
    var cell = cells[index];
    if (!cell) return;

    var oldChar = currentChars[index];
    if (oldChar === newChar) return;

    var topChar = cell.querySelector('.flap-top .flap-char');
    var bottomChar = cell.querySelector('.flap-bottom .flap-char');
    var flip = cell.querySelector('.flap-flip');
    var flipFront = cell.querySelector('.flap-flip-front .flap-char');
    var flipBack = cell.querySelector('.flap-flip-back .flap-char');

    flip.classList.remove('flipping');

    flipFront.textContent = oldChar;
    flipBack.textContent = newChar;
    bottomChar.textContent = newChar;

    void flip.offsetWidth;
    flip.classList.add('flipping');
    playClick();

    var tid = setTimeout(function() {
      topChar.textContent = newChar;
      flip.classList.remove('flipping');
      currentChars[index] = newChar;
    }, FLIP_MS);
    cellTimers[index].push(tid);
  }

  // ──────────────────────────────────────────────
  // Drum cycle — spin forward through every
  // intermediate character (like real hardware).
  // Fast at start, decelerates toward the end.
  // ──────────────────────────────────────────────
  function drumToChar(index, targetChar, baseDelay) {
    cancelCell(index);

    var fromIdx = drumIndex[currentChars[index]];
    var toIdx = drumIndex[targetChar];
    if (fromIdx === undefined) fromIdx = 0;
    if (toIdx === undefined) toIdx = 0;

    var steps = [];
    var pos = fromIdx;
    while (pos !== toIdx) {
      pos = (pos + 1) % drum.length;
      steps.push(drum[pos]);
    }

    if (steps.length === 0) return 0;

    var minGap = 35;
    var maxGap = 160;
    var cumulative = 0;

    for (var s = 0; s < steps.length; s++) {
      var progress = s / steps.length;
      var gap = minGap + (maxGap - minGap) * progress * progress;
      var tid = (function(t, ch) {
        return setTimeout(function() {
          flipCell(index, ch);
        }, baseDelay + t);
      })(cumulative, steps[s]);
      cellTimers[index].push(tid);
      cumulative += gap;
    }

    return cumulative + FLIP_MS;
  }

  // ──────────────────────────────────────────────
  // Layout — center quote block on the board.
  // Quote lines left-aligned, author right-aligned.
  // ──────────────────────────────────────────────
  function layoutQuote(lines) {
    var grid = [];
    var authorRows = {};
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) row.push(' ');
      grid.push(row);
    }

    var usedRows = Math.min(lines.length, ROWS);
    var startRow = Math.floor((ROWS - usedRows) / 2);

    for (var l = 0; l < usedRows; l++) {
      var line = lines[l] || '';
      var isAuthor = line.charAt(0) === '@';
      if (isAuthor) line = line.substring(1);
      if (line.length > COLS) line = line.substring(0, COLS);
      var pad = isAuthor ? (COLS - line.length) : 0;
      if (isAuthor) authorRows[startRow + l] = true;
      for (var ch = 0; ch < line.length; ch++) {
        grid[startRow + l][pad + ch] = line[ch];
      }
    }

    return { grid: grid, authorRows: authorRows };
  }

  // ──────────────────────────────────────────────
  // Display — cascade drum cycles across the board
  // ──────────────────────────────────────────────
  function displayQuote(result, callback) {
    var grid = result.grid;
    var authorRows = result.authorRows;

    // Apply author classes per-cell only after each cell's drum settles
    var maxDrumTime = 0;

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var idx = r * COLS + c;
        var target = grid[r][c];
        var delay = (r * COLS + c) * CHAR_DELAY;

        if (currentChars[idx] !== target) {
          var drumTime = drumToChar(idx, target, delay);
          if (delay + drumTime > maxDrumTime) maxDrumTime = delay + drumTime;
        }

        // Schedule author class change per-cell after its drum finishes
        (function(cellIdx, row, cellDelay) {
          var tid = setTimeout(function() {
            if (authorRows[row]) {
              cells[cellIdx].classList.add('author-cell');
            } else {
              cells[cellIdx].classList.remove('author-cell');
            }
          }, cellDelay + FLIP_MS + 50);
          cellTimers[cellIdx].push(tid);
        })(idx, r, delay);
      }
    }

    setTimeout(callback, maxDrumTime + HOLD_MS);
  }

  // ──────────────────────────────────────────────
  // Shuffle and cycle
  // ──────────────────────────────────────────────
  var shuffled = quotes.slice();
  for (var si = shuffled.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffled[si];
    shuffled[si] = shuffled[sj];
    shuffled[sj] = tmp;
  }

  var qIndex = 0;
  function cycle() {
    var quote = shuffled[qIndex % shuffled.length];
    var result = layoutQuote(quote);
    displayQuote(result, function() {
      qIndex++;
      cycle();
    });
  }

  setTimeout(cycle, 800);
})();
</script>

</body>
</html>
